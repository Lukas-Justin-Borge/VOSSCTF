<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>My Simple Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
        }

        header {
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background: #555;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        main {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        button {
            padding: 10px 15px;
            border: none;
            background: #333;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #555;
        }

        footer {
            text-align: center;
            padding: 10px;
            background: #333;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <header>
        <h1>Welcome to My Website</h1>
        <p>This is a simple HTML page</p>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <main>
        <div class="card">
            <h2>About</h2>
            <!-- Maybe if i hide my flag here, noone will be able to find it >:) VOSSCTF{n00n3_w111_3v3r_b3_4b13_t0_f1nd_th15}-->
            <p>This is a basic website you can open locally. You can edit this text however you want.</p>
        </div>

        <div class="card">
            <h2>Interactive Button</h2>
            <p>Click the button below:</p>
            <button onclick="sayHello()">Click me</button>
        </div>
    </main>

    <footer>
        <p>© 2026 My Website</p>
    </footer>

    <script>
        function sayHello() {
            alert("Hello! You clicked the button 🎉");
        }
    </script>

</body>

</html>
